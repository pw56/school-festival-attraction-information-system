name: Build and Deploy to GitHub Pages

on:
  workflow_call:
    inputs:
      directory:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      directory:
        required: true
        type: string
        default: '.'

# GitHub Pages へのデプロイに必要な権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          cache: 'npm'
          cache-dependency-path: '${{ github.event.inputs.directory || inputs.directory }}/package-lock.json'

      # 1. 指定されたルートディレクトリでビルド（サブディレクトリのdistも自動生成される）
      - name: Install dependencies and Build
        run: |
          cd ${{ github.event.inputs.directory || inputs.directory }}
          npm ci
          npm run build

      # 2. 生成されたすべての dist を含む、ルートディレクトリ全体を一時保存
      - name: Upload temporary build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-workspace
          path: ${{ github.event.inputs.directory || inputs.directory }}/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 1. 自身のGitHub PagesのトップURLを自動取得して環境変数に格納
      - name: Get GitHub Pages URL
        id: pages-info
        run: |
          # リポジトリ名を取得（例: owner/repo -> repo）
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          # GitHub Pagesの標準的なURL構造を組み立て
          echo "HOSTED_URL=https://${{ github.repository_owner }}.github.io/$REPO_NAME" >> $GITHUB_ENV

      # 2. 現在ホストされているファイルをwgetでフォルダごと取得（既存ファイルの維持用）
      - name: Fetch current hosted assets
        run: |
          mkdir -p ./deploy_workspace
          # --mirror: 再帰取得, -p: ページに必要な全ファイル, -nH: ホスト名フォルダを作らない, -P: 保存先
          wget --mirror -p -K -nH --no-check-certificate -P ./deploy_workspace ${{ env.HOSTED_URL }} || true

      # 3. ビルドジョブから成果物（全階層の dist が入った状態）をダウンロード
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: build-workspace
          path: ./temp_workspace

      # 4. サブディレクトリを含めたすべての dist の中身を展開し、デプロイ用フォルダへ合成
      - name: Merge Artifact and Flatten dist folders into Workspace
        run: |
          TARGET_DIR="${{ github.event.inputs.directory || inputs.directory }}"
          TARGET_PATH="./deploy_workspace/$TARGET_DIR"
          
          mkdir -p "$TARGET_PATH"
          
          # 一時ワークスペース内の「すべての階層の dist フォルダ」を探して処理
          find ./temp_workspace -type d -name "dist" | while read -r dist_dir; do
            parent_dir=$(dirname "$dist_dir")
            echo "--------------------------------------------------"
            echo "Target Directory: $parent_dir"
            
            # 【新規追加】1. dist 以外のファイル・フォルダを削除
            echo "Cleaning up non-dist items in $parent_dir..."
            find "$parent_dir" -mindepth 1 -maxdepth 1 ! -name "dist" -exec rm -rf {} \;
            
            # 2. distの中身（隠しファイル含む全ファイル）を親ディレクトリへ移動
            echo "Flattening: Moving contents of $dist_dir to $parent_dir"
            if [ "$(ls -A "$dist_dir")" ]; then
              (shopt -s dotglob; mv "$dist_dir"/* "$parent_dir/")
            fi
            
            # 3. 空になった dist ディレクトリを削除
            rmdir "$dist_dir"
          done
          
          # 最後に、クリーンかつ展開された状態のファイルをデプロイ用ワークスペースにコピー（上書き合成）
          # ※ルート直下に残っている可能性のある node_modules 等も念のため除外
          rsync -av --exclude='node_modules' \
                    --exclude='package.json' \
                    --exclude='package-lock.json' \
                    ./temp_workspace/ "$TARGET_PATH/"

      # 5. 合成済みのディレクトリを GitHub Pages 用にアップロード
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './deploy_workspace'

      # 6. GitHub Pages へのデプロイ
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
