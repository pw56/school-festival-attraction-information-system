name: Build Tests

on:
  push:
    paths:
      - 'tests/**'
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    working-directory: ./tests

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm' # キャッシュを有効化

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 1. ビルド成果物のアップロード (GitHub Pagesの仕様で必須)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './'

      # 2. GitHub Pages へのデプロイ
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
