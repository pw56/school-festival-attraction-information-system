name: Build Event Guide App

on:
  push:
    paths:
      - 'apps/event-guide-app/**'

# GitHub Pages へのデプロイに必要な権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      directory: ./apps/event-guide-app
